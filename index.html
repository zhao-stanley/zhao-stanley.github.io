<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat</title>
    <script type="importmap">
      {
        "imports": {
          "vue": "https://cdn.jsdelivr.net/npm/vue@3.5.32/dist/vue.esm-browser.js",
          "vue-router": "https://cdn.jsdelivr.net/npm/vue-router@5.0.4/dist/vue-router.esm-browser.prod.js",
          "@graffiti-garden/implementation-decentralized": "https://cdn.jsdelivr.net/npm/@graffiti-garden/implementation-decentralized@0.0.9/dist/browser/index.js",
          "@graffiti-garden/wrapper-vue": "https://cdn.jsdelivr.net/npm/@graffiti-garden/wrapper-vue@1.2.2/dist/browser/plugin.mjs"
        }
      }
    </script>
    <script src="index.js" type="module"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">Loading…</div>

    <template id="template">
      <section v-if="!$graffitiSession.value" class="login">
        <h1>Chat</h1>
        <p>Log in to create and join chats.</p>
        <button class="primary" @click="$graffiti.login()">Log in</button>
      </section>

      <div v-else class="app">
        <aside class="sidebar" :class="{ open: isSidebarOpen }">
          <header class="sidebar-head">
            <router-link to="/" class="brand"><h1>Chats</h1></router-link>
            <button class="icon close" @click="isSidebarOpen = false" aria-label="Close">×</button>
          </header>

          <p v-if="areMyChatsLoading" class="muted">Loading…</p>
          <p v-else-if="!myChats.length" class="muted">No chats yet.</p>
          <ul v-else class="chat-list">
            <li v-for="join in myChats" :key="join.value.target">
              <router-link
                :to="`/chat/${encodeURIComponent(join.value.target)}`"
                class="chat-link"
                @click="onChatClick"
              >
                <span class="dot"></span>
                <span class="title">{{ join.value.title || 'Untitled' }}</span>
              </router-link>
            </li>
          </ul>

          <footer class="sidebar-foot">
            <router-link to="/newchat" class="secondary nav-link">+ New chat</router-link>
            <button class="secondary" @click="isJoinOpen = true">Join by invite</button>
            <router-link to="/about" class="link nav-link">About</router-link>
            <button class="link" @click="$graffiti.logout($graffitiSession.value)">Log out</button>
          </footer>
        </aside>

        <main class="main">
          <button class="icon menu floating" @click="isSidebarOpen = true" aria-label="Menu">☰</button>
          <router-view />
        </main>
      </div>

      <div v-if="isJoinOpen" class="modal-backdrop" @click.self="isJoinOpen = false">
        <div class="modal">
          <h3>Join by invite</h3>
          <form @submit.prevent="joinByInvite">
            <input v-model="inviteId" type="text" placeholder="Paste invite ID" required autofocus />
            <div class="row">
              <button type="button" class="secondary" @click="isJoinOpen = false">Cancel</button>
              <button type="submit" class="primary" :disabled="!inviteId.trim() || isJoining">
                {{ isJoining ? 'Joining…' : 'Join' }}
              </button>
            </div>
          </form>
        </div>
      </div>
    </template>
  </body>
</html>
